# Server
server.port=8080

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/spire}
spring.datasource.username=${DB_USERNAME:spire}
spring.datasource.password=${DB_PASSWORD:spire}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:defaultSecretKeyThatShouldBeChangedInProduction0123456789}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# Razorpay
razorpay.key-id=${RAZORPAY_KEY_ID:rzp_test_placeholder}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:placeholder_secret}

# AWS S3
aws.s3.bucket=${AWS_S3_BUCKET:spire-assets}
aws.s3.region=${AWS_S3_REGION:ap-south-1}
aws.s3.access-key=${AWS_ACCESS_KEY:}
aws.s3.secret-key=${AWS_SECRET_KEY:}

# CORS
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
