# Dev profile - H2 in-memory database
spring.datasource.url=jdbc:h2:mem:spiredev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable schema.sql auto-execution (uses Postgres syntax, incompatible with H2)
spring.sql.init.mode=never

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

jwt.secret=devSecretKeyForLocalDevelopmentOnly01234567890123456789

cors.allowed-origins=http://localhost:3000,http://localhost:3001,http://localhost:5173
